name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          ACB5EC: ${{ secrets.ACB5EC }}
          BCE552: ${{ secrets.BCE552 }}
        run: |
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('ACB5EC', '')
          meta_b = os.environ.get('BCE552', '')
          page = pathlib.Path('index.html')
          src = page.read_text(encoding='utf-8')
          out = src
          if meta_a:
              out = out.replace('<!-- 39760ef9665e398197c508fb3480f77f1003ac -->', meta_a)
          if meta_b:
              out = out.replace('<!-- 694c99fdf905926de853c64f0a49df960bf2c965ac9c94 -->', meta_b)
          if out == src and (meta_a or meta_b):
              sys.exit(1)
          if out != src:
              page.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
